<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Infinity Reached</title>
<style>
  body {
    margin: 0;
    font-family: 'Times New Roman', sans-serif;
    text-align: center;
    padding: 50px;
  }
  .box {
    border: 2px solid #000;
    padding: 40px;
    margin: 50px auto;
    max-width: 500px;
    background: #fff;
  }
  h1 {
    font-size: 32px;
  }
  .super-points {
    font-size: 24px;
    margin: 20px 0;
  }
  button {
    font-family: 'Times New Roman', sans-serif;
    font-size: 18px;
    padding: 10px 20px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="box">
  <h1>INFINITY REACHED</h1>
  <p>You have earned a Mr Brown Super Point</p>
  <div class="super-points">Mr Brown Super Points: <span id="super-count">1</span></div>
  <p>Your points and upgrades have been reset.</p>
  <button onclick="goBack()">Continue Playing?</button>
</div>

<script>
  let superPoints = parseInt(localStorage.getItem('superPoints')) || 0;
  document.getElementById('super-count').textContent = superPoints;

  function goBack() {
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
