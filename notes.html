<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Personal Notes</title>
</head>
<body id="notes-body" style="margin:0;font-family:'Times New Roman',sans-serif;text-align:center;background:#fff;">

<div style="background:#888;color:white;padding:20px;font-size:24px;text-align:left;">
  📝 Personal Notes - Enter your name to see your note, all lowercase, first name only!!!!
</div>

<div style="margin-top:20px;">
  <a href="index.html" style="font-family:'Times New Roman',sans-serif;font-size:16px;">← Back to main page</a>
</div>

<div style="margin-top:40px;">
  <p>Type your name below to find your note. All lowercase, first name only:</p>
  <input type="text" id="name-input" placeholder="Your name..." style="font-family:'Times New Roman',sans-serif;font-size:18px;padding:6px;width:220px;">
  <br><br>
  <button onclick="lookupNote()" style="font-family:'Times New Roman',sans-serif;font-size:16px;padding:6px 16px;cursor:pointer;">Find my note</button>
</div>

<div id="note-output" style="margin-top:30px;font-size:20px;font-family:'Times New Roman',sans-serif;"></div>

<script>
  const savedBg = localStorage.getItem('bgColour');
  if (savedBg) document.getElementById('notes-body').style.background = savedBg;
  // i forgot so many peolpe bruh    fgdsfdf

    "cyrus": "imagine getting a question wrong LOL",
    "samuel": "i played football with you in year 4 and you were much better than me",
    "joseph": "you can solve a rubick's cube.. I think",
    "harry": "Harry I made up a character that shares a name with you, I call him hairy davies and he licks the top of people's heads",

  function lookupNote() {
    const input = document.getElementById('name-input').value.trim();
    const output = document.getElementById('note-output');
    if (!input) {
      output.innerHTML = 'Please type your name!';
      return;
    }
    const key = input.toLowerCase();
    if (notes[key]) {
      output.innerHTML = '📬 ' + notes[key];
    } else {
      output.innerHTML = "What's up " + input + " I promise I didnt forget you.";
    }
  }

  // Allow pressing Enter
  document.getElementById('name-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') lookupNote();
  });
</script>
